# 访客VIP自动开通服务配置
visitor:
  # 外部接口配置
  api:
    # 外部接口地址（需要替换为实际地址）
    url: http://10.100.111.3:8888
#    url: http://www.xuerparking.cn:8543
    page-size: 1000
    # 接口认证配置
    app-key: F7FE3A3DF4924C2493744E25822BE3AD
  
  # 访客预约查询接口配置
  reservation:
    api:
      # 访客预约查询接口地址
      url: http://202.118.214.8:8675
  
  # 自动开通配置
  auto:
    # 是否启用自动开通功能（true-启用，false-禁用）
    enabled: true
    
    # 智能调度配置（降低服务器负担）
    schedule:
      # 调度模式: static(固定间隔) / dynamic(动态间隔)
      mode: dynamic

      # 固定间隔配置（当mode=static时使用）
      fixed-interval: 2000  # 固定2秒
      
      # 动态间隔配置（当mode=dynamic时使用）
      min-interval: 2000     # 最小间隔2秒（有数据变化时）
      max-interval: 30000    # 最大间隔30秒（长时间无变化时）
      idle-interval: 10000   # 空闲间隔10秒（连续无变化时）
      no-change-threshold: 5 # 连续无变化次数阈值
      
      # 时间段调度策略
      time-based:
        enabled: true
        work-hours: "06:00-18:00"   # 工作时间，保持高频
        off-hours: "18:00-23:00"    # 下班时间，中等频率
        night-hours: "23:00-06:00"  # 夜间时间，低频率
    
    # 断路器配置（防止接口故障时持续调用）
    circuit-breaker:
      enabled: true
      failure-threshold: 3   # 连续失败3次后开启断路器
      timeout-seconds: 60    # 断路器开启后60秒尝试恢复
      request-timeout: 5000  # 单次请求超时时间5秒
    
    # 变更检测配置（使用HashMap快速对比）
    change-detection:
      enabled: true
      cache-size: 2000       # 缓存最近2000条数据
    
    # 存储模式选择 ⭐ 重要配置
    storage:
      # 模式: memory(纯内存) / hybrid(混合模式-数据库+内存)
      mode: memory           # 默认使用纯内存模式
      
      # 混合模式配置（仅当mode=hybrid时生效）
      hybrid:
        enabled: false       # 是否启用混合模式
        batch-size: 100      # 批量操作大小
        cache-refresh-interval: 3600  # 缓存刷新间隔（秒）