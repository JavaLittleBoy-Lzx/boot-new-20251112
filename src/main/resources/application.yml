mybatis-plus:
  mapper-locations: classpath:**/mapper/**/*.xml
  type-aliases-package: com.parkingmanage.entity
  # 全局逻辑删除的实体
  global-config:
    db-config:
      logic-delete-field: deleted  # 全局逻辑删除的实体字段名(since 3.3.0,配置后可以忽略不配置步骤2)
      logic-delete-value: 1      # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0    # 逻辑未删除值(默认为 0)
#      logic-delete-column:
  # MyBatis配置
  configuration:
    map-underscore-to-camel-case: true  # 开启驼峰命名转换
#文件存储位置
file:
  upload-path: /usr/local/nefu_system/uploadfile/
  upload:
    path: /usr/local/nefu_system/uploads  # 文件上传存储路径（使用绝对路径）
    url-prefix: /uploads  # 文件访问URL前缀
  # 配置SpringMVC文件上传限制，默认1M。注意MB要大写，不然报错。SpringBoot版本不同，配置项不同
  spring:
    servlet:
      multipart:
        max-file-size: 50MB
        max-request-size: 50MB
